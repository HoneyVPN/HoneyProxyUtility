name: Build Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_B64 }}" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Build APK — direct flavor (arm64 + armeabi-v7a + x86_64)
        run: |
          flutter build apk --flavor direct --release --split-per-abi \
            --dart-define=FLAVOR=direct \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}

      - name: Rename APKs
        run: |
          TAG=${{ github.ref_name }}
          for f in build/app/outputs/flutter-apk/app-direct-*-release.apk; do
            base=$(basename "$f" .apk)
            mv "$f" "build/app/outputs/flutter-apk/HoneyProxyUtility-${TAG}-${base#app-direct-}.apk"
          done

      - name: Deploy APK to honeyvpn.ru
        run: |
          TAG=${{ github.ref_name }}
          APK=$(ls build/app/outputs/flutter-apk/HoneyProxyUtility-*arm64*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            APK=$(ls build/app/outputs/flutter-apk/HoneyProxyUtility-*.apk 2>/dev/null | head -1)
          fi
          if [ -n "$APK" ]; then
            curl -X POST https://api.honeyvpn.ru/deploy/android \
              -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
              -H "X-Version: $TAG" \
              -F "file=@$APK" \
              --fail --show-error --max-time 300
          fi

      - name: Create GitHub Release (public repo)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.PUBLIC_REPO_PAT }}
          repository: HoneyVPN/HoneyProxyUtility
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: build/app/outputs/flutter-apk/HoneyProxyUtility-*.apk
          name: HoneyProxyUtility ${{ github.ref_name }}
          body: |
            ## HoneyProxyUtility ${{ github.ref_name }} — Android

            ### Скачать APK
            - **arm64-v8a** (большинство современных телефонов)
            - **armeabi-v7a** (старые телефоны)
            - **x86_64** (эмуляторы)

            ### Установка
            1. Скачай APK под свой процессор
            2. Разреши установку из неизвестных источников
            3. Установи и добавь подписку через @honeyvpnru_bot
