name: Build Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: "stable"
          cache: true

      - name: Patch pubspec — add Windows stubs
        shell: python
        run: |
          with open("pubspec.yaml", "r", encoding="utf-8") as f:
              content = f.read()
          override = (
              "\ndependency_overrides:\n"
              "  flutter_v2ray:\n"
              "    path: windows/flutter_v2ray_stub\n"
              "  mobile_scanner:\n"
              "    path: windows/mobile_scanner_stub\n"
          )
          if "dependency_overrides" not in content:
              content += override
          with open("pubspec.yaml", "w", encoding="utf-8") as f:
              f.write(content)

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Download sing-box
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ "Authorization" = "Bearer $env:GITHUB_TOKEN"; "User-Agent" = "GitHub-Actions" }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/shtorm-7/sing-box-extended/releases/latest" -Headers $headers
          $asset = ($release.assets | Where-Object { $_.name -like "*windows-amd64.zip" })[0]
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "singbox.zip" -Headers $headers
          Expand-Archive -Path "singbox.zip" -DestinationPath "build\windows\singbox" -Force
          $exe = Get-ChildItem -Recurse "build\windows\singbox" -Filter "sing-box.exe" | Select-Object -First 1
          Copy-Item $exe.FullName "build\windows\x64\runner\Release\sing-box.exe"
          $dll = Get-ChildItem -Recurse "build\windows\singbox" -Filter "wintun.dll" | Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName "build\windows\x64\runner\Release\wintun.dll" }

      - name: Create installer output directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path build\windows\installer

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        run: iscc windows\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: HoneyProxyUtility-Windows-Setup
          path: build\windows\installer\HoneyProxyUtility-Setup.exe
          retention-days: 30

      - name: Deploy EXE to honeyvpn.ru
        shell: powershell
        run: |
          $token = "3fed35576ea0f97561d539404bf565a756939d44d43b08662985058b318b5b8a"
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $file = "build\windows\installer\HoneyProxyUtility-Setup.exe"
          $uri = "https://api.honeyvpn.ru/deploy/windows"
          curl.exe -X POST $uri -H "X-Deploy-Token: $token" -H "X-Version: $tag" -F "file=@$file" --fail --show-error --max-time 300

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          $tag = "${{ github.ref_name }}"
          $ErrorActionPreference = "SilentlyContinue"
          gh release view $tag 2>$null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if ($releaseExists) {
            gh release upload $tag "build\windows\installer\HoneyProxyUtility-Setup.exe" --clobber
          } else {
            gh release create $tag "build\windows\installer\HoneyProxyUtility-Setup.exe#HoneyProxyUtility-Setup.exe" --title "HoneyProxyUtility $tag" --generate-notes
          }
