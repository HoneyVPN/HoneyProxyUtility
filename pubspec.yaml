name: honeyproxyutility
description: HoneyProxyUtility — universal VPN client with provider marketplace
version: 1.0.68+68
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # VPN integration via Platform Channels (sing-box libbox JNI integrated natively)
  flutter_v2ray: ^1.0.10

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1

  # Navigation
  go_router: ^17.2.2

  # Local storage — SharedPreferences + JSON (no code gen needed)
  shared_preferences: ^2.5.5

  # Network
  dio: ^5.9.2
  connectivity_plus: ^7.1.1

  # Link parsing
  yaml: ^3.1.3

  # QR code
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

  # UI / animations
  lottie: ^3.3.3
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Platform utilities
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  open_file: ^3.3.2
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0

  # Localization
  intl: ^0.20.2

  country_flags: ^2.2.0

  # Logging
  logging: ^1.2.0
  sentry_flutter: ^9.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/lottie/
    - assets/images/
    - assets/geo/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter-Bold.ttf
          weight: 700
